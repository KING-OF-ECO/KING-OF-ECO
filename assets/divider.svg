<svg width="1200" height="64" viewBox="0 0 1200 64" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-labelledby="title desc">
  <title id="title">Signal divider</title>
  <desc id="desc">An animated divider line with glowing gold and green accents.</desc>
  <defs>
    <linearGradient id="lineGradient" x1="108" y1="32" x2="1092" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E1114"/>
      <stop offset="0.2" stop-color="#C9A227"/>
      <stop offset="0.5" stop-color="#1FE69A"/>
      <stop offset="0.8" stop-color="#C9A227"/>
      <stop offset="1" stop-color="#0E1114"/>
    </linearGradient>
    <filter id="lineGlow" x="-30%" y="-100%" width="160%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="12" y="8" width="1176" height="48" rx="24" fill="#080A0C"/>
  <rect x="12.5" y="8.5" width="1175" height="47" rx="23.5" stroke="#C9A227" stroke-opacity="0.18"/>

  <path id="dividerPath" d="M108 32H1092" stroke="url(#lineGradient)" stroke-width="2" stroke-linecap="round" filter="url(#lineGlow)"/>

  <circle cx="108" cy="32" r="4" fill="#C9A227">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1092" cy="32" r="4" fill="#1FE69A">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <rect x="474" y="16" width="252" height="32" rx="16" fill="#0F1515" stroke="#1FE69A" stroke-opacity="0.24"/>
  <text x="600" y="37" fill="#EEF4F1" font-size="15" font-family="'Trebuchet MS', Arial, sans-serif" text-anchor="middle" letter-spacing="4">SIGNAL GRID ONLINE</text>

  <circle r="6" fill="#A6FF69" filter="url(#lineGlow)">
    <animateMotion dur="4.2s" repeatCount="indefinite" rotate="auto">
      <mpath xlink:href="#dividerPath"/>
    </animateMotion>
    <animate attributeName="r" values="5;7;5" dur="1.1s" repeatCount="indefinite"/>
  </circle>
</svg>
