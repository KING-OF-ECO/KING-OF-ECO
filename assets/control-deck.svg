<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-labelledby="title desc">
  <title id="title">Research command console</title>
  <desc id="desc">An animated dashboard showing radar, charts, and terminal panels for the KING-OF-ECO GitHub profile.</desc>
  <defs>
    <linearGradient id="deckBg" x1="40" y1="18" x2="1160" y2="342" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#060708"/>
      <stop offset="0.5" stop-color="#0A0E10"/>
      <stop offset="1" stop-color="#111A17"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="60" y1="0" x2="1140" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8E9A4"/>
      <stop offset="0.48" stop-color="#C9A227"/>
      <stop offset="1" stop-color="#8A6514"/>
    </linearGradient>
    <linearGradient id="greenEdge" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1FE69A"/>
      <stop offset="1" stop-color="#A6FF69"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101517" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0A0D0E" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="greenGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="1184" height="344" rx="26" fill="url(#deckBg)"/>
  <rect x="8.5" y="8.5" width="1183" height="343" rx="25.5" stroke="url(#goldEdge)" stroke-opacity="0.18"/>

  <circle cx="1110" cy="70" r="110" fill="#1FE69A" fill-opacity="0.07">
    <animate attributeName="r" values="102;116;102" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1020" cy="286" r="132" fill="#C9A227" fill-opacity="0.05">
    <animate attributeName="fill-opacity" values="0.03;0.08;0.03" dur="6.4s" repeatCount="indefinite"/>
  </circle>

  <text x="58" y="42" fill="#F3EEE1" font-size="18" font-family="'Trebuchet MS', Arial, sans-serif" letter-spacing="5">RESEARCH COMMAND CONSOLE</text>
  <rect x="1014" y="24" width="120" height="26" rx="13" fill="#0E1513" stroke="#1FE69A" stroke-opacity="0.28"/>
  <text x="1074" y="41" fill="#A6FF69" font-size="13" font-family="'Trebuchet MS', Arial, sans-serif" text-anchor="middle" letter-spacing="3">LOCKED IN</text>

  <g opacity="0.22">
    <path d="M58 58H1142" stroke="#819089" stroke-width="1"/>
    <path d="M58 326H1142" stroke="#819089" stroke-width="1"/>
  </g>

  <g>
    <rect x="42" y="72" width="326" height="232" rx="20" fill="url(#panelFill)" stroke="#C9A227" stroke-opacity="0.18"/>
    <text x="68" y="103" fill="#D8B34B" font-size="16" font-family="'Trebuchet MS', Arial, sans-serif" letter-spacing="3">INFERENCE RADAR</text>

    <g transform="translate(200 194)">
      <circle r="82" stroke="#173028" stroke-width="1.5"/>
      <circle r="58" stroke="#173028" stroke-width="1.5"/>
      <circle r="34" stroke="#173028" stroke-width="1.5"/>
      <circle r="6" fill="#A6FF69" filter="url(#greenGlow)">
        <animate attributeName="r" values="5;8;5" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <path d="M-82 0H82M0 -82V82" stroke="#173028" stroke-width="1.5"/>
      <path d="M-58 -58L58 58M58 -58L-58 58" stroke="#10221D" stroke-width="1"/>
      <circle r="82" stroke="#1FE69A" stroke-opacity="0.18" stroke-width="1">
        <animate attributeName="stroke-opacity" values="0.08;0.4;0.08" dur="4s" repeatCount="indefinite"/>
      </circle>
      <g>
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="8s" repeatCount="indefinite"/>
        <path d="M0 0L66 -22" stroke="#1FE69A" stroke-width="2.5" stroke-linecap="round" filter="url(#greenGlow)"/>
        <circle cx="66" cy="-22" r="5" fill="#A6FF69" filter="url(#greenGlow)"/>
      </g>
      <circle cx="-48" cy="-36" r="3.5" fill="#C9A227">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="54" cy="40" r="4" fill="#1FE69A">
        <animate attributeName="opacity" values="1;0.2;1" dur="3.4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <text x="68" y="260" fill="#DDE6E1" font-size="14" font-family="'Trebuchet MS', Arial, sans-serif" letter-spacing="2">QUESTION DENSITY</text>
    <text x="290" y="260" fill="#A6FF69" font-size="14" font-family="'Trebuchet MS', Arial, sans-serif" text-anchor="end" letter-spacing="2">HIGH</text>
    <text x="68" y="284" fill="#DDE6E1" font-size="14" font-family="'Trebuchet MS', Arial, sans-serif" letter-spacing="2">NOISE TOLERANCE</text>
    <text x="290" y="284" fill="#F8E9A4" font-size="14" font-family="'Trebuchet MS', Arial, sans-serif" text-anchor="end" letter-spacing="2">LOW</text>
  </g>

