      <animate attributeName="height" values="84;98;76;84" dur="3.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="604" y="154" width="22" height="116" rx="8" fill="#1FE69A" fill-opacity="0.55">
      <animate attributeName="y" values="154;140;170;154" dur="4.6s" repeatCount="indefinite"/>
      <animate attributeName="height" values="116;130;100;116" dur="4.6s" repeatCount="indefinite"/>
