      <path d="M416 158H750" stroke="#7F8E88" stroke-width="1"/>
      <path d="M416 190H750" stroke="#7F8E88" stroke-width="1"/>
      <path d="M416 222H750" stroke="#7F8E88" stroke-width="1"/>
      <path d="M416 254H750" stroke="#7F8E88" stroke-width="1"/>
      <path d="M456 122V270" stroke="#7F8E88" stroke-width="1"/>
      <path d="M516 122V270" stroke="#7F8E88" stroke-width="1"/>
