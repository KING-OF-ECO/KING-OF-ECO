      <animate attributeName="y" values="172;154;186;172" dur="4.1s" repeatCount="indefinite"/>
      <animate attributeName="height" values="98;116;82;98" dur="4.1s" repeatCount="indefinite"/>
    </rect>

    <path id="deckPath" d="M428 240C470 228 492 174 540 174C578 174 588 232 632 232C676 232 700 144 746 144" fill="none" opacity="0"/>
    <path d="M428 240C470 228 492 174 540 174C578 174 588 232 632 232C676 232 700 144 746 144" stroke="url(#greenEdge)" stroke-width="4.5" stroke-linecap="round" filter="url(#greenGlow)"/>
    <path d="M428 240C470 228 492 174 540 174C578 174 588 232 632 232C676 232 700 144 746 144" stroke="#D9FFF1" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round"/>
    <circle r="5" fill="#A6FF69" filter="url(#greenGlow)">
      <animateMotion dur="5s" repeatCount="indefinite" rotate="auto">
        <mpath xlink:href="#deckPath"/>
      </animateMotion>
    </circle>

    <text x="418" y="292" fill="#AAB7B2" font-size="13" font-family="'Trebuchet MS', Arial, sans-serif" letter-spacing="2">ALPHA</text>
    <text x="536" y="292" fill="#AAB7B2" font-size="13" font-family="'Trebuchet MS', Arial, sans-serif" letter-spacing="2">BETA</text>
    <text x="654" y="292" fill="#AAB7B2" font-size="13" font-family="'Trebuchet MS', Arial, sans-serif" letter-spacing="2">GAMMA</text>
  </g>

  <g>
    <rect x="798" y="72" width="360" height="232" rx="20" fill="url(#panelFill)" stroke="#C9A227" stroke-opacity="0.18"/>
    <text x="824" y="103" fill="#D8B34B" font-size="16" font-family="'Trebuchet MS', Arial, sans-serif" letter-spacing="3">TERMINAL</text>

    <rect x="824" y="122" width="132" height="34" rx="10" fill="#141A18" stroke="#1FE69A" stroke-opacity="0.28"/>
    <text x="890" y="144" fill="#EEF4F1" font-size="17" font-family="'Trebuchet MS', Arial, sans-serif" text-anchor="middle" letter-spacing="4">NJUPT</text>

    <text x="824" y="186" fill="#CFD8D3" font-size="15" font-family="'Trebuchet MS', Arial, sans-serif" letter-spacing="2">MODE</text>
    <text x="1116" y="186" fill="#A6FF69" font-size="15" font-family="'Trebuchet MS', Arial, sans-serif" text-anchor="end" letter-spacing="2">POLICY EVAL</text>
    <text x="824" y="212" fill="#CFD8D3" font-size="15" font-family="'Trebuchet MS', Arial, sans-serif" letter-spacing="2">METHOD</text>
    <text x="1116" y="212" fill="#A6FF69" font-size="15" font-family="'Trebuchet MS', Arial, sans-serif" text-anchor="end" letter-spacing="2">CAUSAL INFERENCE</text>
    <text x="824" y="238" fill="#CFD8D3" font-size="15" font-family="'Trebuchet MS', Arial, sans-serif" letter-spacing="2">OUTPUT</text>
    <text x="1116" y="238" fill="#F8E9A4" font-size="15" font-family="'Trebuchet MS', Arial, sans-serif" text-anchor="end" letter-spacing="2">RESEARCH GRADE</text>

    <rect x="824" y="260" width="306" height="4" rx="2" fill="#103228" opacity="0.6"/>
    <rect x="824" y="260" width="122" height="4" rx="2" fill="#1FE69A" filter="url(#greenGlow)">
      <animate attributeName="width" values="84;202;122;240;122" dur="5s" repeatCount="indefinite"/>
    </rect>
    <rect x="816" y="164" width="322" height="2" rx="1" fill="#A6FF69" opacity="0">
      <animate attributeName="y" values="164;248;164" dur="4.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.75;0" dur="4.8s" repeatCount="indefinite"/>
    </rect>

    <g opacity="0.48">
      <rect x="978" y="122" width="140" height="16" rx="8" fill="#151A19">
        <animate attributeName="opacity" values="0.22;0.58;0.22" dur="2.4s" repeatCount="indefinite"/>
      </rect>
      <rect x="978" y="146" width="112" height="10" rx="5" fill="#151A19">
        <animate attributeName="opacity" values="0.58;0.22;0.58" dur="2.1s" repeatCount="indefinite"/>
      </rect>
    </g>
