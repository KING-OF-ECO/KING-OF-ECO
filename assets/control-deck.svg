  <g>
    <rect x="58" y="318" width="208" height="22" rx="11" fill="#0E1513" stroke="#1FE69A" stroke-opacity="0.22"/>
    <rect x="286" y="318" width="208" height="22" rx="11" fill="#0F1114" stroke="#C9A227" stroke-opacity="0.22"/>
    <rect x="514" y="318" width="208" height="22" rx="11" fill="#0E1513" stroke="#1FE69A" stroke-opacity="0.22"/>
    <rect x="742" y="318" width="208" height="22" rx="11" fill="#0F1114" stroke="#C9A227" stroke-opacity="0.22"/>
    <rect x="970" y="318" width="172" height="22" rx="11" fill="#0E1513" stroke="#1FE69A" stroke-opacity="0.22"/>

    <text x="162" y="333" fill="#E8EFEB" font-size="12" font-family="'Trebuchet MS', Arial, sans-serif" text-anchor="middle" letter-spacing="2">ECONOMICS</text>
    <text x="390" y="333" fill="#E8EFEB" font-size="12" font-family="'Trebuchet MS', Arial, sans-serif" text-anchor="middle" letter-spacing="2">IDENTIFICATION</text>
    <text x="618" y="333" fill="#E8EFEB" font-size="12" font-family="'Trebuchet MS', Arial, sans-serif" text-anchor="middle" letter-spacing="2">DATA SYSTEMS</text>
    <text x="846" y="333" fill="#E8EFEB" font-size="12" font-family="'Trebuchet MS', Arial, sans-serif" text-anchor="middle" letter-spacing="2">AI LEVERAGE</text>
    <text x="1056" y="333" fill="#E8EFEB" font-size="12" font-family="'Trebuchet MS', Arial, sans-serif" text-anchor="middle" letter-spacing="2">NJUPT</text>
