  </rect>
  <rect x="120" y="376" width="266" height="10" rx="5" fill="#1FE69A" fill-opacity="0.28">
    <animate attributeName="fill-opacity" values="0.16;0.34;0.16" dur="2.8s" repeatCount="indefinite"/>
  </rect>

  <g>
    <rect x="790" y="72" width="338" height="156" rx="20" fill="url(#panel)" stroke="#C9A227" stroke-opacity="0.22">
      <animate attributeName="stroke-opacity" values="0.12;0.36;0.12" dur="4.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="800" y="118" width="318" height="3" rx="1.5" fill="#A6FF69" opacity="0">
      <animate attributeName="y" values="118;214;118" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.72;0" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="820" y="112" fill="#D9AF37" font-size="18" font-family="'Trebuchet MS', Arial, sans-serif" letter-spacing="3">STATUS BOARD</text>
    <text x="820" y="146" fill="#EEF3F0" font-size="22" font-family="'Trebuchet MS', Arial, sans-serif">Question density</text>
    <text x="1034" y="146" fill="#1FE69A" font-size="22" font-family="'Trebuchet MS', Arial, sans-serif">HIGH</text>
    <text x="820" y="176" fill="#EEF3F0" font-size="22" font-family="'Trebuchet MS', Arial, sans-serif">Noise tolerance</text>
    <text x="1021" y="176" fill="#F8E9A4" font-size="22" font-family="'Trebuchet MS', Arial, sans-serif">LOW</text>
    <text x="820" y="206" fill="#EEF3F0" font-size="22" font-family="'Trebuchet MS', Arial, sans-serif">Inference mode</text>
    <text x="994" y="206" fill="#1FE69A" font-size="22" font-family="'Trebuchet MS', Arial, sans-serif">CAUSAL</text>
  </g>

  <g opacity="0.72">
    <text x="790" y="274" fill="#B8C8C0" font-size="15" font-family="'Trebuchet MS', Arial, sans-serif" letter-spacing="2">ALPHA</text>
    <text x="872" y="274" fill="#B8C8C0" font-size="15" font-family="'Trebuchet MS', Arial, sans-serif" letter-spacing="2">BETA</text>
    <text x="952" y="274" fill="#B8C8C0" font-size="15" font-family="'Trebuchet MS', Arial, sans-serif" letter-spacing="2">GAMMA</text>
    <text x="1040" y="274" fill="#B8C8C0" font-size="15" font-family="'Trebuchet MS', Arial, sans-serif" letter-spacing="2">R-SQ</text>
    <text x="790" y="356" fill="#F1F5F3" font-size="18" font-family="'Trebuchet MS', Arial, sans-serif" letter-spacing="3">MODEL / MEASURE / RULE</text>
